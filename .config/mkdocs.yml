site_name: Patterns
site_url: https://curioss.org/patterns/
use_directory_urls: true
nav:
  # This adds a link in the navigation bar on the left
  - Home: README.md
  - Template: PATTERN-TEMPLATE.md
  - Authors: authors/index.md

# Associated Git Repo Config
repo_url: https://github.com/CURIOSSorg/curioss-patterns
# use rep_name to change how the name is shown in the top right corner
# repo_name: gh:curioss-patterns
docs_dir: "../"
# site_dir is specified in build command, not here

# Exclude tooling directories from the docs tree (docs_dir is the repo root,
# so anything not matching default dotfile/underscore filtering needs listing).
exclude_docs: |
  /node_modules/
  /site/
  /authors.yml

# Theme Configuration
# Colour options: red, pink, purple, deep purple, indigo, blue, light blue,
#                 cyan, teal, green, light green, lime, yellow, amber,
#                 orange, deep orange
theme:
  name: 'material'
  language: 'en'
  features:
    - navigation.instant
    - navigation.instant.progress
  icon:
    tag:
      # keys refers to the tags identifier in the extra section below
      # values are the icons to show. List of icons available
      # https://squidfunk.github.io/mkdocs-material/setup/setting-up-tags/
      agp: material/scale-balance
      awareness: material/rss-box
      community: fontawesome/solid/people-group
      value: material/diamond
      dei: fontawesome/solid/rainbow
      edu: material/book-education
      funding: material/gold
      development: material/code-tags
      discovery: material/lightbulb
      sustainability: material/recycle
      promoting: material/newspaper
      rewards: material/medal
      tools: material/toolbox
      transfer: material/transfer
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: 'teal'
    accent: 'teal'
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: 'black'
    accent: 'teal'
    toggle:
      icon: material/weather-night
      name: Switch to light mode
  logo: 'assets/curioss_logo_white.svg'

markdown_extensions:
  - toc:
      permalink: ' §'
  - footnotes
  - sane_lists
plugins:
  - search
  - tags
  - rss:
      enabled: true
      # match_path picks which pages become feed items. We include every
      # top-level .md EXCEPT the four meta/generated paths below:
      #   - authors/        (generated author pages, not patterns)
      #   - README.md       (the home page itself)
      #   - PATTERN-TEMPLATE.md / CONTRIBUTING.md  (docs about patterns, not patterns)
      # If you add another top-level non-pattern document later
      # (e.g. CODE-OF-CONDUCT.md), append it here or it will show up
      # in the feed as if it were a new pattern.
      match_path: '(?!authors/|README\.md$|PATTERN-TEMPLATE\.md$|CONTRIBUTING\.md$).*\.md'
      length: 50
      abstract_chars_count: 280
      date_from_meta:
        as_creation: git
        as_update: git
      categories:
        - tags
      # Filenames are LEFT AT THE PLUGIN DEFAULTS because Material for
      # MkDocs hardcodes the autodiscovery <link rel="alternate"> in its
      # base.html to feed_rss_created.xml / feed_rss_updated.xml. Renaming
      # the files here would silently break browser/reader autodiscovery.
      pretty_print: true
      json_feed_enabled: false
      feed_title: "CURIOSS Patterns — new patterns"
      feed_description: "New patterns published in the CURIOSS Patterns catalogue."
      image: "https://curioss.org/patterns/assets/curioss_logo_white.svg"
      use_git: true
hooks:
  - hooks/authors.py
extra:
  tags:
    # Set a tag with a identifier so then an icon can be set on the theme.
    Advocacy, Governance & Policy: agp
    Awareness: awareness
    Community Building: community
    Demonstrating value as an Academic OSPO: value
    Diversity, Equity & Inclusion: dei
    Education & Skills: edu
    Funding & Financial Support: funding
    Open Source Development: development
    Open Source Discovery: discovery
    Open Source Sustainability: sustainability
    Promoting Best Practices: promoting
    Rewards & Recognition: rewards
    Tools & Infrastructure: tools
    Working with Tech Transfer / External Partners: transfer
